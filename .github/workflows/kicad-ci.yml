name: Electrical Engineering CI (KiCad)

on:
  push:
    paths:
      - 'electrical/kicad_project/**'
  pull_request:
    paths:
      - 'electrical/kicad_project/**'

jobs:
  kicad_tests:
    runs-on: ubuntu-latest
    
    # We use an official docker image that comes with KiCad 8 pre-installed
    container: setsoft/kicad_auto:ki8
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4   # <--- UPDATED TO v4

      - name: Run Electrical Rule Check (ERC)
        run: |
          echo "Running ERC on Schematic..."
          kicad-cli sch erc electrical/kicad_project/flight_controller.kicad_sch --format rpt --output erc_report.rpt
          
          if grep -q "Error" erc_report.rpt; then
            echo "ERC FAILED! There are electrical shorts or floating pins."
            cat erc_report.rpt
            exit 1
          fi

      - name: Run Design Rule Check (DRC)
        run: |
          echo "Running DRC on PCB Layout..."
          kicad-cli pcb drc electrical/kicad_project/flight_controller.kicad_pcb --format rpt --output drc_report.rpt
          
          if grep -q "Error" drc_report.rpt; then
            echo "DRC FAILED! Trace widths or clearances violate PCB physics."
            cat drc_report.rpt
            exit 1
          fi

      - name: Upload Logs on Success/Failure
        uses: actions/upload-artifact@v4   # <--- UPDATED TO v4
        if: always()
        with:
          name: KiCad_Reports
          path: |
            erc_report.rpt
            drc_report.rpt