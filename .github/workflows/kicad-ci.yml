name: Electrical Engineering CI (KiCad)

on:
  push:
    paths:
      - 'electrical/kicad_project/**'
  pull_request:
    paths:
      - 'electrical/kicad_project/**'

jobs:
  kicad_tests:
    runs-on: ubuntu-latest
    
    container: setsoft/kicad_auto:ki8
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Electrical Rule Check (ERC)
        run: |
          echo "Running ERC on Schematic..."
          # Removed the invalid format flag. Outputs to plain text.
          kicad-cli sch erc electrical/kicad_project/kicad_project.kicad_sch --output erc_report.txt
          
          # Print the report to the GitHub terminal so you can read it
          cat erc_report.txt
          
          # Fail the PR if the word "Error" is found
          if grep -q "Error" erc_report.txt; then
            echo "ERC FAILED! There are electrical shorts or floating pins."
            exit 1
          fi

      - name: Run Design Rule Check (DRC)
        run: |
          echo "Running DRC on PCB Layout..."
          # Same fix here.
          kicad-cli pcb drc electrical/kicad_project/flight_controller.kicad_pcb --output drc_report.txt
          
          cat drc_report.txt
          
          if grep -q "Error" drc_report.txt; then
            echo "DRC FAILED! Trace widths or clearances violate PCB physics."
            exit 1
          fi

      - name: Upload Logs on Success/Failure
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: KiCad_Reports
          path: |
            erc_report.txt
            drc_report.txt